<!DOCTYPE html>
<html>
<head>
    <title>Delete Product</title>
</head>
<body>

    <h2>Confirm Delete</h2>

    <p>Are you sure you want to delete this product?</p>

    <h3>{{ product.name }}</h3>

    <form method="POST">
        {% csrf_token %}
        
        <button type="submit" style="background-color:red; color:white;">
            Yes, Delete
        </button>

        <a href="{% url 'manager_dashboard' %}">
            Cancel
        </a>
    </form>

</body>
</html>
