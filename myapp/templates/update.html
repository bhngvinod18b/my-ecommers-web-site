<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Update Order Status</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
        }
        .container {
            max-width: 500px;
            padding: 20px;
            border: 1px solid #ccc;
            background: #f9f9f9;
        }
        label, select, button {
            display: block;
            width: 100%;
            margin-bottom: 15px;
        }
        button {
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
        .info {
            margin-bottom: 20px;
        }
        a {
            display: inline-block;
            margin-top: 10px;
            color: blue;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Update Status for Order #{{ item.id }}</h2>

    <div class="info">
        <p><strong>User:</strong> {{ item.user.username }}</p>
        <p><strong>Product:</strong> {{ item.product.product }}</p>
        <p><strong>Current Status:</strong> {{ item.status }}</p>
    </div>

    <form method="post">
        {% csrf_token %}
        <label for="status">Select New Status:</label>
        <select name="status" id="status" required>
            <option value="pending" {% if item.status == 'pending' %}selected{% endif %}>Pending</option>
            <option value="confirmed" {% if item.status == 'confirmed' %}selected{% endif %}>Confirmed</option>
            <option value="cancelled" {% if item.status == 'cancelled' %}selected{% endif %}>Cancelled</option>
        </select>

        <button type="submit">Update Status</button>
    </form>

    <a href="{% url 'manager_dashboard' %}">Back to Manager Dashboard</a>
</div>

</body>
</html>
