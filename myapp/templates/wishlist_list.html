<!DOCTYPE html>
<html>
<head>
    <title>My Wishlist</title>

    <style>
        body{
            font-family:Arial;
            background:#f3f4f6;
        }

        .container{
            width:90%;
            margin:auto;
            padding:30px;
        }

        .grid{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
            gap:20px;
        }

        .card{
            background:white;
            padding:20px;
            border-radius:12px;
            box-shadow:0 5px 15px rgba(0,0,0,0.1);
        }

        .title{
            font-size:20px;
            font-weight:bold;
            margin-bottom:10px;
        }

        .price{
            color:green;
            font-weight:bold;
        }

        .btn{
            display:inline-block;
            margin-top:10px;
            padding:8px 12px;
            background:#ef4444;
            color:white;
            border-radius:6px;
            text-decoration:none;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>❤️ My Wishlist</h2>

    <div class="grid">

        {% for item in wishlist_items %}

        <div class="card">

            <!-- Product details -->
            <div class="title">{{ item.product.product }}</div>

            <div class="price">₹{{ item.product.price }}</div>

            <p>Category: {{ item.product.catogery }}</p>

            <p>Quantity: {{ item.product.quantity }}</p>

        </div>

        {% empty %}
            <h3>No items in wishlist 😢</h3>
        {% endfor %}

    </div>

</div>

</body>
</html>
