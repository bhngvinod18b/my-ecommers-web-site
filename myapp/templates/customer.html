<!DOCTYPE html>
<html>
<head>
    <title>Customer Profile</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial;
        }

        body{
            background:#f3f4f6;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            width:400px;
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0 5px 20px rgba(0,0,0,0.1);
        }

        h2{
            text-align:center;
            margin-bottom:25px;
            color:#111827;
        }

        .form-group{
            margin-bottom:18px;
        }

        label{
            display:block;
            margin-bottom:6px;
            color:#374151;
            font-weight:bold;
        }

        input{
            width:100%;
            padding:12px;
            border:1px solid #d1d5db;
            border-radius:8px;
            outline:none;
            font-size:15px;
        }

        input:focus{
            border-color:#2563eb;
        }

        button{
            width:100%;
            padding:12px;
            border:none;
            background:#2563eb;
            color:white;
            font-size:16px;
            border-radius:8px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#1d4ed8;
        }

        .back{
            display:block;
            text-align:center;
            margin-top:15px;
            text-decoration:none;
            color:#2563eb;
        }

    </style>

</head>

<body>

<div class="container">

    <h2>Customer Profile 👤</h2>

    <form method="POST">

        {% csrf_token %}

        <div class="form-group">
            <label>Name</label>
            <input type="text" name="name" required>
        </div>

        <div class="form-group">
            <label>Phone</label>
            <input type="text" name="phone" required>
        </div>

        <div class="form-group">
            <label>Gmail</label>
            <input type="email" name="gmail" required>
        </div>

        <div class="form-group">
            <label>Address</label>
            <input type="text" name="adress" required>
        </div>

        <button type="submit">
            Save Profile
        </button>

    </form>

    <a href="{% url 'customer_dashboard' %}">customer_dashboard</a>
    <a href="{% url 'customer_home' %}">home</a>
        ← Back
    </a>

</div>

</body>
</html>
