<!DOCTYPE html>
<html>
<head>
    <title>Manager Profile</title>

    <style>
        body {
            font-family: Arial;
            background: #fef3c7;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: white;
            padding: 25px;
            border-radius: 10px;
            width: 300px;
        }

        input {
            width: 100%;
            margin: 8px 0;
            padding: 10px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #f59e0b;
            border: none;
            color: white;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>Manager Profile</h2>

    <form method="POST">
        {% csrf_token %}

        <input type="text" name="name" placeholder="Name">
        <input type="number" phone="phone" placeholder="phone">

        <button type="submit">Save</button>
    </form>
</div>

</body>
</html>
