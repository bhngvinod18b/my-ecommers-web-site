<!DOCTYPE html>
<html>
<head>
    <title>Home</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial;
        }

        body{
            background:#f3f4f6;
        }

        /* NAVBAR */

        .navbar{
            background:#111827;
            color:white;
            padding:15px 30px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .logo{
            font-size:24px;
            font-weight:bold;
        }

        .nav-links a{
            color:white;
            text-decoration:none;
            margin-left:15px;
            padding:8px 14px;
            border-radius:6px;
            transition:0.3s;
        }

        .nav-links a:hover{
            background:#374151;
        }

        .login-btn{
            background:#2563eb;
        }

        .register-btn{
            background:#16a34a;
        }

        /* HERO */

        .hero{
            height:300px;
            background:linear-gradient(135deg,#4f46e5,#7c3aed);
            display:flex;
            justify-content:center;
            align-items:center;
            flex-direction:column;
            color:white;
            text-align:center;
        }

        .hero h1{
            font-size:50px;
            margin-bottom:10px;
        }

        .hero p{
            font-size:18px;
        }

        /* PRODUCTS */

        .container{
            width:90%;
            margin:auto;
            padding:40px 0;
        }

        .title{
            margin-bottom:25px;
            color:#111827;
        }

        .products{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
            gap:20px;
        }

        .card{
            background:white;
            border-radius:12px;
            padding:20px;
            box-shadow:0 5px 15px rgba(0,0,0,0.1);
            transition:0.3s;
        }

        .card:hover{
            transform:translateY(-5px);
        }

        .product-name{
            font-size:22px;
            color:#111827;
            margin-bottom:10px;
        }

        .qty{
            color:#4b5563;
            margin-bottom:8px;
        }

        .category{
            display:inline-block;
            background:#2563eb;
            color:white;
            padding:5px 10px;
            border-radius:20px;
            font-size:12px;
            margin-bottom:15px;
        }

        /* ✅ BOOK BUTTON STYLE */

        .book-btn{
            display:inline-block;
            background:#16a34a;
            color:white;
            padding:8px 14px;
            border-radius:6px;
            text-decoration:none;
            font-size:14px;
            transition:0.3s;
        }

        .book-btn:hover{
            background:#15803d;
        }

        /* FOOTER */

        .footer{
            background:#111827;
            color:white;
            text-align:center;
            padding:20px;
            margin-top:40px;
        }

    </style>
</head>

<body>

<!-- NAVBAR -->

<div class="navbar">

    <div class="logo">
        Django Store 🚀
    </div>

    <div class="nav-links">

        <a href="{% url 'login' %}" class="login-btn">
            Login
        </a>

        <a href="{% url 'register' %}" class="register-btn">
            Register
        </a>

    </div>

</div>

<!-- HERO -->

<div class="hero">

    <h1>Welcome to Django Store</h1>

    <p>
        Product Management System with Django
    </p>

</div>

<!-- PRODUCTS -->

<div class="container">

    <h2 class="title">Latest Products 📦</h2>

    <div class="products">

        {% for p in products %}

            <div class="card">

                <div class="product-name">
                    {{ p.product }}
                </div>

                <div class="qty">
                    Quantity : {{ p.quantity }}
                </div>

                <span class="category">
                    {{ p.catogery }}
                </span>

                <!-- ✅ BOOK BUTTON -->
                <div style="margin-top:15px;">
                    <a href="{% url 'book' p.id %}" class="book-btn">
                        Book Now
                    </a>
                </div>

            </div>

        {% empty %}

            <div class="empty">
                <h3>No Products Available</h3>
            </div>

        {% endfor %}

    </div>

</div>

<!-- FOOTER -->

<div class="footer">
    <p>© 2026 Django Store | All Rights Reserved</p>
</div>

</body>
</html>
